<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- AcmeClaw Robot Mascot Favicon -->
  <!-- Copyright 2026 Chad Hendren. All Rights Reserved. -->
  <defs>
    <linearGradient id="acmeclaw-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc3c32"/>
      <stop offset="100%" stop-color="#8b1a1a"/>
    </linearGradient>
  </defs>
  <!-- Robot Body -->
  <rect x="30" y="30" width="60" height="50" rx="12" fill="url(#acmeclaw-gradient)"/>
  <!-- Robot Head -->
  <rect x="35" y="15" width="50" height="35" rx="10" fill="url(#acmeclaw-gradient)"/>
  <!-- Antenna -->
  <line x1="50" y1="15" x2="40" y2="5" stroke="#dc3c32" stroke-width="3" stroke-linecap="round"/>
  <circle cx="40" cy="5" r="3" fill="#dc3c32"/>
  <line x1="70" y1="15" x2="80" y2="5" stroke="#dc3c32" stroke-width="3" stroke-linecap="round"/>
  <circle cx="80" cy="5" r="3" fill="#dc3c32"/>
  <!-- Eyes -->
  <circle cx="48" cy="32" r="6" fill="#050810"/>
  <circle cx="72" cy="32" r="6" fill="#050810"/>
  <circle cx="49" cy="31" r="3" fill="#00e5cc"/>
  <circle cx="73" cy="31" r="3" fill="#00e5cc"/>
  <!-- Claw Arms -->
  <path d="M30 55 L15 60 L10 55 L5 62 L15 65 L30 60Z" fill="url(#acmeclaw-gradient)"/>
  <path d="M90 55 L105 60 L110 55 L115 62 L105 65 L90 60Z" fill="url(#acmeclaw-gradient)"/>
  <!-- Legs -->
  <rect x="42" y="80" width="8" height="20" rx="3" fill="url(#acmeclaw-gradient)"/>
  <rect x="70" y="80" width="8" height="20" rx="3" fill="url(#acmeclaw-gradient)"/>
  <!-- Chest Panel -->
  <rect x="45" y="45" width="30" height="20" rx="4" fill="#0a0e17" opacity="0.5"/>
  <rect x="50" y="50" width="20" height="3" rx="1" fill="#00e5cc" opacity="0.6"/>
  <rect x="50" y="56" width="14" height="3" rx="1" fill="#00e5cc" opacity="0.4"/>
</svg>
